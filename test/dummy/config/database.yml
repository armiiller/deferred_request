default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
<% if ENV["DATABASE_URL"] %>
  url: <%= ENV["DATABASE_URL"] %>
<% end %>

development:
  <<: *default
  database: deferred_request_development

test:
  <<: *default
  database: deferred_request_test

production:
  <<: *default
  database: deferred_request_production
